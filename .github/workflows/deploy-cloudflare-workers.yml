name: Deploy Web to Cloudflare Workers

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Cloudflare credentials
        run: |
          # Accept common secret/variable aliases for easier setup.
          RESOLVED_API_TOKEN="${CLOUDFLARE_API_TOKEN_SECRET:-$CF_API_TOKEN_SECRET}"
          if [ -z "$RESOLVED_API_TOKEN" ]; then
            RESOLVED_API_TOKEN="${CLOUDFLARE_API_TOKEN_VAR:-$CF_API_TOKEN_VAR}"
          fi

          RESOLVED_ACCOUNT_ID="${CLOUDFLARE_ACCOUNT_ID_SECRET:-$CF_ACCOUNT_ID_SECRET}"
          if [ -z "$RESOLVED_ACCOUNT_ID" ]; then
            RESOLVED_ACCOUNT_ID="${CLOUDFLARE_ACCOUNT_ID_VAR:-$CF_ACCOUNT_ID_VAR}"
          fi

          # Normalize values to avoid common copy/paste issues:
          # - surrounding quotes from shell snippets
          # - trailing newlines from multi-line paste
          RESOLVED_API_TOKEN="$(printf '%s' "$RESOLVED_API_TOKEN" | tr -d '\r\n' | sed -e "s/^['\"]//" -e "s/['\"]$//")"
          RESOLVED_ACCOUNT_ID="$(printf '%s' "$RESOLVED_ACCOUNT_ID" | tr -d '\r\n' | sed -e "s/^['\"]//" -e "s/['\"]$//")"

          echo "CLOUDFLARE_API_TOKEN=$RESOLVED_API_TOKEN" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$RESOLVED_ACCOUNT_ID" >> "$GITHUB_ENV"
        env:
          CLOUDFLARE_API_TOKEN_SECRET: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN_SECRET: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN_VAR: ${{ vars.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN_VAR: ${{ vars.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID_SECRET: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ACCOUNT_ID_SECRET: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_ACCOUNT_ID_VAR: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CF_ACCOUNT_ID_VAR: ${{ vars.CF_ACCOUNT_ID }}

      - name: Validate Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN."
            echo "Set one of: secret CLOUDFLARE_API_TOKEN / CF_API_TOKEN, or variable CLOUDFLARE_API_TOKEN / CF_API_TOKEN."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID."
            echo "Set one of: secret CLOUDFLARE_ACCOUNT_ID / CF_ACCOUNT_ID, or variable CLOUDFLARE_ACCOUNT_ID / CF_ACCOUNT_ID."
            exit 1
          fi

      - name: Verify Cloudflare authentication
        run: |
          if ! curl -fsS "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" >/tmp/cf-token-verify.json; then
            echo "Cloudflare token verification request failed."
            echo "Check CLOUDFLARE_API_TOKEN is a valid Cloudflare API Token (not API Key) and not revoked."
            exit 1
          fi

          if ! node -e 'const fs = require("node:fs"); const d = JSON.parse(fs.readFileSync("/tmp/cf-token-verify.json","utf8")); process.exit(d.success ? 0 : 1)'; then
            echo "Cloudflare token is invalid."
            echo "Please recreate token and grant required Workers permissions."
            exit 1
          fi

      - name: Verify Cloudflare account access
        run: |
          if ! curl -fsS "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" >/tmp/cf-account-check.json; then
            echo "Cloudflare account access check failed."
            echo "Token may not have access to account $CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

          if ! node -e 'const fs = require("node:fs"); const d = JSON.parse(fs.readFileSync("/tmp/cf-account-check.json","utf8")); process.exit(d.success ? 0 : 1)'; then
            echo "Cloudflare account access denied for account $CLOUDFLARE_ACCOUNT_ID."
            echo "Ensure token belongs to the same account and includes Workers deploy permissions."
            exit 1
          fi

      - name: Deploy apps/web
        run: npm run deploy --workspace web

name: Build Desktop Clients

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: Web URL loaded by the desktop clients
        required: true
        default: https://www.turingfin.com
      web_path:
        description: Desktop entry path
        required: true
        default: /app

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact: stocks-analysis-macos
            artifact_paths: |
              apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
              apps/desktop/src-tauri/target/release/bundle/macos/*.app
          - name: Windows
            os: windows-latest
            artifact: stocks-analysis-windows
            artifact_paths: |
              apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
              apps/desktop/src-tauri/target/release/bundle/msi/*.msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build desktop client
        run: npm run desktop:build
        env:
          DESKTOP_WEB_URL: ${{ inputs.web_url }}
          DESKTOP_WEB_PATH: ${{ inputs.web_path }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
